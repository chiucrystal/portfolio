<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enabling self-serve and scalable program creation — crystal.chiu</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    /* ─── Nav ─────────────────────────────────────────────────── */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      background-color: var(--color-bg);
      border-bottom: 1px solid rgba(131, 125, 125, 0.2);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 40px;
    }

    .nav-logo {
      text-decoration: none;
      text-transform: none; /* overrides t-label uppercase */
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
    }

    .nav-links a {
      color: var(--color-body); /* overrides t-h3 color-heading */
      text-decoration: none;
      text-transform: none; /* overrides global a uppercase */
    }

    /* ─── Container ──────────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px;
    }

    /* ─── Title block ─────────────────────────────────────────── */
    .title-block {
      padding-top: 48px;
    }

    .title-block h1 {
      margin-bottom: 12px;
    }

    .meta-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }

    /* ─── Hero ────────────────────────────────────────────────── */
    .hero {
      margin-top: 57px; /* nav height offset */
    }

    .hero img {
      display: block;
      width: 100%;
      max-height: 480px;
      object-fit: cover;
      object-position: top;
    }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="../index.html" class="nav-logo t-label">crystal.chiu</a>
    <ul class="nav-links">
      <li><a href="../index.html#work" class="t-h3">work</a></li>
      <li><a href="../index.html#about" class="t-h3">about</a></li>
      <li><a href="../index.html#resume" class="t-h3">resume</a></li>
    </ul>
  </nav>

  <main>

    <section class="hero">
      <img src="assets/programs/hero.png" alt="Programs creation interface showing the Add courses step">
    </section>

    <div class="container">

      <div class="title-block">
        <h1 class="t-display">Enabling self-serve and scalable program creation.</h1>
        <div class="meta-row">
          <span class="t-label">WiseTech Global (2025) · Team: 1 UX designer, 1 product manager, 4 developers</span>
          <a href="#solution" class="t-link">Jump to solution</a>
        </div>
      </div>

    </div>

  </main>

</body>
</html>
